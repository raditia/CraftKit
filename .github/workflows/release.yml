name: Create Release on Version Bump

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Extract version from README
        id: version
        run: |
          VERSION=$(grep -m1 '^# craftkit' README.md | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+')
          if [ -z "$VERSION" ]; then
            echo "No version found in README header — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if tag already exists
        id: tag_check
        if: steps.version.outputs.skip == 'false'
        run: |
          if git ls-remote --tags origin "refs/tags/${{ steps.version.outputs.version }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract changelog entry for this version
        id: notes
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Match the changelog table row: | `v1.3.0` | date | description |
          ENTRY=$(grep "| \`${VERSION}\`" README.md | sed 's/^| `[^`]*` | [^|]* | //' | sed 's/ |$//')
          if [ -z "$ENTRY" ]; then
            ENTRY="See README for full changelog."
          fi
          # Use delimiter-safe output for multiline safety
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$ENTRY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create tag
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git tag "${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"

      - name: Create GitHub release
        if: steps.tag_check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.version }}" \
            --title "craftkit ${{ steps.version.outputs.version }}" \
            --notes "${{ steps.notes.outputs.notes }}"
